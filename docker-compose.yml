services:
    db:
        image: mysql:8.0
        container_name: mysql_container
        environment:
          MYSQL_ROOT_PASSWORD: StrongRootPass123
          MYSQL_DATABASE: vuedb
          MYSQL_USER: myuser
          MYSQL_PASSWORD: UserPass456
        ports:
          # Only accessible from backend, therefore its not 3306:3306
          - "3306"
        volumes:
          - mysql_data:/var/lib/mysql
    backend:
        image: backend
        container_name: backend_container
        restart: always
        depends_on:
          - db
        ports: 
          - "8080:8080"
        build:
          context: ./backend
    front-end:
        image: frontend
        container_name: frontend_container
        ports:
          - "5173:5173"
        depends_on:
          - backend
        build:
          context: ./frontend
volumes:
  mysql_data:
